<body class="font-body-md text-on-surface">
<!-- Background Shader -->

<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-between min-h-screen w-full px-margin-mobile py-xl overflow-y-auto">
<!-- Header / Status Area -->
<header class="w-full flex flex-col items-center gap-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Sleep peacefully</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">Music will stop in 1 hour</p>
</header>
<!-- Central Hero Section -->
<section class="flex-1 flex flex-col items-center justify-center w-full max-w-md">
<!-- Moon Illustration Container -->
<div class="relative w-64 h-64 md:w-80 md:h-80 mb-lg flex items-center justify-center">
<!-- Ambient Glow behind the moon -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-[64px]"></div>
<img alt="Minimalist crescent moon with soft blue halo" class="relative z-10 w-full h-full object-contain animate-[pulse_6s_ease-in-out_infinite]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuEh7gbZVUmqlCAo7O0fVjDBXo8jNmm5zFEWBnZAY3zcHwrFeKrlH7KZjTdOnOZi-AhtitA8pzbn5fkzDSPE_1AJZs2EmX743EUuz4pDbUBWGKKRKnhJibaYQknnPe8XBQgP_KoX1C8yyod7wrINtEmJ9fnIwYTskfQ4jh2hZwL701h5odo0JPxSKOg6QeL1QDh49iGs1bhHrq0yY4ELAn75CRIOAHRXqPjEuHJx5QzyeR4qNmPFlLgVXq02_cN9uXYdWPhviSlOmY"/>
</div>
<!-- Countdown Timer -->
<div class="timer-container text-center">
<span class="font-display text-[64px] font-bold tracking-tight text-on-surface-variant" id="countdown">00:59:59</span>
</div>
<!-- Subtle Ad Slot (Non-intrusive) -->
<div class="mt-xl w-full">
<div class="ad-container rounded-[24px] px-md py-sm flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-xl bg-primary-container/40 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">eco</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm uppercase tracking-widest text-primary opacity-60">Sponsored</span>
<span class="font-label-md text-label-md text-on-surface-variant">Deep Rain Ambience 2.0</span>
</div>
</div>
<button class="font-label-md text-label-md text-primary font-bold px-md py-xs rounded-full border border-primary/20 hover:bg-primary/10 transition-colors">
                        Add
                    </button>
</div>
</div>
</section>
<!-- Primary Action -->
<footer class="w-full max-w-sm flex flex-col items-center gap-lg">
<button class="w-full py-md px-lg bg-primary text-on-primary rounded-[24px] font-title-md text-title-md sky-glow transition-all active:scale-95 duration-300 relative overflow-hidden group shadow-lg" onclick="handleEndSleep()">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                End Sleep Mode
            </button>
</footer>
</main>
<!-- Success Modal (Hidden by default) -->
<div class="fixed inset-0 z-[100] hidden items-center justify-center px-margin-mobile" id="successModal">
<div class="absolute inset-0 bg-on-surface/5 backdrop-blur-2xl"></div>
<div class="bg-surface-container-lowest w-full max-w-sm rounded-[32px] p-xl sky-glow relative z-10 flex flex-col items-center text-center animate-in fade-in zoom-in duration-500 border border-outline-variant/20 shadow-2xl">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">light_mode</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">Good Morning</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl">You slept for 7 hours and 42 minutes.</p>
<button class="w-full py-md bg-primary text-on-primary rounded-[24px] font-title-md text-title-md shadow-md active:scale-95 transition-transform" onclick="location.reload()">
                View Summary
            </button>
</div>
</div>
<script>
        // Simple Countdown Logic
        let timeLeft = 3599; // 59:59 in seconds
        const timerElement = document.getElementById('countdown');

        function updateTimer() {
            const h = Math.floor(timeLeft / 3600);
            const m = Math.floor((timeLeft % 3600) / 60);
            const s = timeLeft % 60;

            const display = [
                h.toString().padStart(2, '0'),
                m.toString().padStart(2, '0'),
                s.toString().padStart(2, '0')
            ].join(':');

            timerElement.textContent = display;

            if (timeLeft > 0) {
                timeLeft--;
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Modal Logic
        function handleEndSleep() {
            const modal = document.getElementById('successModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
    </script>
